name: CI

# CI ジョブ:
# - core-go: core/ の Go ビルド・テスト (race) ・カバレッジ・vet
# - markdown-format: リポジトリ全体の Markdown フォーマットチェック (prettier)
# - go-mod-tidy-check: core/go.mod / go.sum が `go mod tidy` 後と一致すること
# - rulesync-drift-check: .rulesync/ 変更時に `make rulesync` の生成物が最新であること
#
# 後続マイルストーンで追加予定:
# - golangci-lint (M0.2 以降、Lint 強化)
# - examples/go-react/{backend,frontend} の job (実装着手時)
# - examples/kotlin-nextjs/{backend,frontend} の job (実装着手時)

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  core-go:
    name: core/ Go test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          # core/go.sum はまだ存在しない (標準ライブラリのみ) ため cache-dependency-path は省略。
          # 依存追加で go.sum が生成された後にキャッシュが有効化される。
          cache: false

      - name: Build
        run: make build

      - name: Test (race + coverage)
        run: make test-cover

      - name: Vet
        run: make lint

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: core-coverage
          path: core/coverage.txt
          if-no-files-found: warn
          retention-days: 7

  core-go-integration:
    name: core/ Go integration test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    services:
      postgres:
        image: postgres:18.3
        env:
          POSTGRES_USER: core
          POSTGRES_PASSWORD: core_dev_pw
          POSTGRES_DB: id_core_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U core -d id_core_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      CORE_DB_HOST: localhost
      CORE_DB_PORT: "5432"
      CORE_DB_USER: core
      CORE_DB_PASSWORD: core_dev_pw
      CORE_DB_NAME: id_core_test
      CORE_DB_SSLMODE: disable
      TEST_DATABASE_URL: postgres://core:core_dev_pw@localhost:5432/id_core_test?sslmode=disable
      TEST_DB_REQUIRED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache: false

      - name: Install golang-migrate CLI
        run: make migrate-install

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run integration tests (build tag = integration)
        run: make test-integration

  go-mod-tidy-check:
    name: core/ go mod tidy check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache: false

      # Go 1.23+ の `go mod tidy -diff` を使い、go.mod / go.sum に差分が出る場合は非ゼロ終了する。
      # この方式なら go.sum 非存在時 (依存ゼロ) でも安定して判定できる。
      # 不整合 (依存追加忘れ、未使用依存の残置など) は CI を fail させる。
      - name: Verify go.mod and go.sum are tidy
        run: go mod tidy -diff

  markdown-format:
    name: Markdown format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # prettier のバージョンはルート Makefile の PRETTIER_VERSION と合わせる。
      # .prettierignore でリポジトリ管理外を除外済み。
      - name: Prettier check
        run: npx -y prettier@3.8.3 --check .

  rulesync-drift-check:
    name: rulesync drift check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # .rulesync/ を正本に各 AI ツール向け生成物 (.claude/, .codex/, AGENTS.md, CLAUDE.md 等) を再生成し、
      # コミット済みのファイルと差分が出ないことを検証する。
      # 「.rulesync/ を編集したのに make rulesync を忘れている」状態を防ぐ。
      - name: Regenerate rulesync outputs
        run: make rulesync

      - name: Verify generated files are up-to-date
        run: |
          if ! git diff --exit-code; then
            echo ""
            echo "::error::.rulesync/ の変更が反映されていません。ローカルで 'make rulesync' を実行してから push してください。"
            exit 1
          fi
